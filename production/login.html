<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <!-- Meta, title, CSS, favicons, etc. -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="images/favicon.ico" type="image/ico" />

    <title>Login - Gentelella</title>    
    
    <!-- Vite Entry Point - will bundle all styles -->
    <script type="module" src="/src/main-core.js"></script>
    
    <style>
      .login-bg {
        background: linear-gradient(135deg, #2A3F54 0%, #34495e 100%);
        min-height: 100vh;
      }
      .brand-logo {
        color: #1ABB9C;
        border: 2px solid #1ABB9C;
        padding: 8px 10px;
        border-radius: 50%;
        font-size: 1.2rem;
        margin-right: 10px;
      }
      .login-input-group .form-control,
      .login-input-group .input-group-text,
      .login-input-group .btn {
        height: 38px;
        line-height: 1.5;
      }
      .login-input-group .form-control {
        border-radius: 0;
      }
      .login-input-group .input-group-text {
        border-radius: 0.375rem 0 0 0.375rem;
      }
      .login-input-group .btn {
        border-radius: 0 0.375rem 0.375rem 0;
        border-color: rgb(222, 226, 230) !important;
      }
      .login-input-group .btn:hover {
        background: rgba(0,0,0,0.05) !important;
      }
      .login-input-group .form-control:focus {
        box-shadow: none;
        border-color: #86b7fe;
      }
      .login-input-group .form-control::placeholder {
        padding-left: 8px;
      }
      .eye-btn {
        border-color: rgb(222, 226, 230) !important;
        color: rgb(222, 226, 230) !important;
      }
      .alert {
        border-radius: 0.375rem;
      }
      .spinner-border-sm {
        width: 1rem;
        height: 1rem;
      }
    </style>
  </head>

  <body class="login-bg">
    <div class="container-fluid d-flex align-items-center justify-content-center min-vh-100">
      <div class="row justify-content-center w-100">
        <div class="col-xl-4 col-lg-5 col-md-6 col-sm-8 col-10">
          
          <!-- Login Form Card -->
          <div class="card shadow-lg border-0" id="loginCard">
            <div class="card-body p-5">
              <!-- Brand Header -->
              <div class="text-center mb-4">
                <div class="d-flex align-items-center justify-content-center mb-3">
                  <img src="images/logo.svg" alt="Gentelella" style="height: 35px; width: auto;">
                  <h3 class="mb-0 fw-bold text-dark">Gentelella</h3>
                </div>
                <p class="text-muted">Please sign in to your account</p>
              </div>

              <!-- Alert Messages -->
              <div id="alertContainer"></div>

              <!-- Login Form -->
              <form id="loginForm">
                <div class="mb-3">
                  <label for="username" class="form-label text-muted">Username</label>
                  <div class="input-group login-input-group">
                    <span class="input-group-text bg-light border-end-0">
                      <i class="fas fa-user text-muted"></i>
                    </span>
                    <input type="text" class="form-control border-start-0 ps-0" id="username" placeholder="Enter your username" required>
                  </div>
                  <div class="invalid-feedback" id="usernameError"></div>
                </div>

                <div class="mb-3">
                  <label for="password" class="form-label text-muted">Password</label>
                  <div class="input-group login-input-group">
                    <span class="input-group-text bg-light border-end-0">
                      <i class="fas fa-lock text-muted"></i>
                    </span>
                    <input type="password" class="form-control border-start-0 ps-0" id="password" placeholder="Enter your password" required>
                    <button class="btn btn-outline-secondary border-start-0" type="button" id="togglePassword">
                      <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                  </div>
                  <div class="invalid-feedback" id="passwordError"></div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label text-muted" for="rememberMe">
                      Remember me
                    </label>
                  </div>
                  <a href="#" class="text-decoration-none" id="forgotPasswordLink">Forgot password?</a>
                </div>

                <div class="d-grid mb-3">
                  <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">
                    <span id="loginBtnText">
                      <i class="fas fa-sign-in-alt me-2"></i>Sign In
                    </span>
                    <span id="loginBtnSpinner" class="d-none">
                      <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                      Signing in...
                    </span>
                  </button>
                </div>
              </form>

              <!-- Footer -->
              <div class="text-center mt-4">
                <p class="text-muted mb-2">
                  &copy; 2025 All Rights Reserved. Gentelella is a Bootstrap 5 template.
                </p>
                <div>
                  <a href="#" class="text-muted text-decoration-none me-3">Privacy</a>
                  <a href="#" class="text-muted text-decoration-none me-3">Terms</a>
                  <a href="#" class="text-muted text-decoration-none">Support</a>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- JavaScript for login functionality -->
    <script type="module">
      import { AuthService } from '/src/services/auth-service.js';
      import { CookieManager } from '/src/utils/cookie-manager.js';

      document.addEventListener('DOMContentLoaded', function() {
        console.log('[Login] DOMContentLoaded');
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginBtnText = document.getElementById('loginBtnText');
        const loginBtnSpinner = document.getElementById('loginBtnSpinner');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        const alertContainer = document.getElementById('alertContainer');

        // Initialize services
        const authService = new AuthService();
        const cookieManager = new CookieManager();

        // Password toggle functionality
        togglePassword.addEventListener('click', function() {
          const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordInput.setAttribute('type', type);
          eyeIcon.classList.toggle('fa-eye');
          eyeIcon.classList.toggle('fa-eye-slash');
        });

        // Form validation
        function validateForm() {
          const username = document.getElementById('username').value.trim();
          const password = document.getElementById('password').value.trim();
          let isValid = true;

          // Clear previous errors
          clearErrors();

          if (!username) {
            showFieldError('username', 'Username không được để trống');
            isValid = false;
          }

          if (!password) {
            showFieldError('password', 'Password không được để trống');
            isValid = false;
          }

          return isValid;
        }

        function showFieldError(fieldId, message) {
          const field = document.getElementById(fieldId);
          const errorDiv = document.getElementById(fieldId + 'Error');
          
          field.classList.add('is-invalid');
          errorDiv.textContent = message;
        }

        function clearErrors() {
          const fields = ['username', 'password'];
          fields.forEach(fieldId => {
            const field = document.getElementById(fieldId);
            const errorDiv = document.getElementById(fieldId + 'Error');
            
            field.classList.remove('is-invalid');
            errorDiv.textContent = '';
          });
        }

        function showAlert(message, type = 'danger') {
          alertContainer.innerHTML = `
            <div class="alert alert-${type} alert-dismissible fade show" role="alert">
              <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-triangle'} me-2"></i>
              ${message}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
          `;
        }

        function setLoadingState(loading) {
          if (loading) {
            loginBtn.disabled = true;
            loginBtnText.classList.add('d-none');
            loginBtnSpinner.classList.remove('d-none');
          } else {
            loginBtn.disabled = false;
            loginBtnText.classList.remove('d-none');
            loginBtnSpinner.classList.add('d-none');
          }
        }

        // Form submission
        loginForm.addEventListener('submit', async function(e) {
          e.preventDefault();
          console.log('[Login] Submit clicked');

          if (!validateForm()) {
            return;
          }

          const username = document.getElementById('username').value.trim();
          const password = document.getElementById('password').value.trim();
          const rememberMe = document.getElementById('rememberMe').checked;

          setLoadingState(true);
          clearErrors();

          try {
            console.log('[Login] Calling API /api/auth/login');
            const response = await authService.login(username, password);
            console.log('[Login] API response:', response);

            if (response.message === 'Đăng nhập thành công') {
              // Save tokens to cookies
              const tokenExpiry = rememberMe ? 7 * 24 * 60 * 60 * 1000 : 24 * 60 * 60 * 1000; // 7 days or 1 day
              cookieManager.setCookie('token', response.token, tokenExpiry);
              cookieManager.setCookie('refreshToken', response.refreshToken, tokenExpiry);

              showAlert('Đăng nhập thành công! Đang chuyển hướng...', 'success');
              
              // Redirect to dashboard after 1.5 seconds
              setTimeout(() => {
                window.location.href = '/index.html';
              }, 1500);
            } else {
              showAlert(response.message || 'Đăng nhập thất bại', 'danger');
            }
          } catch (error) {
            console.error('Login error:', error);
            showAlert('Có lỗi xảy ra khi đăng nhập. Vui lòng thử lại.', 'danger');
          } finally {
            setLoadingState(false);
          }
        });

        // Check if user is already logged in
        if (cookieManager.getCookie('token')) {
          showAlert('Bạn đã đăng nhập. Đang chuyển hướng...', 'info');
          setTimeout(() => {
            window.location.href = '/index.html';
          }, 1500);
        }
      });
    </script>
  </body>
</html>
