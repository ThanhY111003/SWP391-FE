<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Test Login Integration</title>
    <script type="module" src="/src/main-core.js"></script>
  </head>
  <body>
    <div class="container mt-5">
      <h1>Test Login Integration</h1>
      
      <div class="row">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header">
              <h5>Authentication Status</h5>
            </div>
            <div class="card-body">
              <div id="authStatus"></div>
              <div id="userInfo"></div>
              <div id="tokens"></div>
            </div>
          </div>
        </div>
        
        <div class="col-md-6">
          <div class="card">
            <div class="card-header">
              <h5>Test Actions</h5>
            </div>
            <div class="card-body">
              <button class="btn btn-primary" onclick="testLogin()">Test Login API</button>
              <button class="btn btn-warning" onclick="testLogout()">Test Logout</button>
              <button class="btn btn-info" onclick="refreshStatus()">Refresh Status</button>
              <button class="btn btn-success" onclick="goToLogin()">Go to Login Page</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { AuthService } from '/src/services/auth-service.js';
      import { CookieManager } from '/src/utils/cookie-manager.js';
      import { authMiddleware } from '/src/utils/auth-middleware.js';

      const authService = new AuthService();
      const cookieManager = new CookieManager();

      function updateStatus() {
        const authStatus = document.getElementById('authStatus');
        const userInfo = document.getElementById('userInfo');
        const tokens = document.getElementById('tokens');

        const isAuth = authMiddleware.isAuthenticated();
        const user = authMiddleware.getCurrentUser();
        const tokenData = cookieManager.getAuthTokens();

        authStatus.innerHTML = `
          <div class="alert alert-${isAuth ? 'success' : 'danger'}">
            <strong>Status:</strong> ${isAuth ? 'Authenticated' : 'Not Authenticated'}
          </div>
        `;

        userInfo.innerHTML = user ? `
          <h6>User Information:</h6>
          <ul class="list-unstyled">
            <li><strong>Username:</strong> ${user.username}</li>
            <li><strong>Roles:</strong> ${user.roles ? user.roles.join(', ') : 'None'}</li>
            <li><strong>Token Expires:</strong> ${new Date(user.exp * 1000).toLocaleString()}</li>
          </ul>
        ` : '<p class="text-muted">No user information available</p>';

        tokens.innerHTML = `
          <h6>Token Information:</h6>
          <ul class="list-unstyled">
            <li><strong>Access Token:</strong> ${tokenData.token ? 'Present' : 'Missing'}</li>
            <li><strong>Refresh Token:</strong> ${tokenData.refreshToken ? 'Present' : 'Missing'}</li>
          </ul>
        `;
      }

      window.testLogin = async function() {
        try {
          const response = await authService.login('testuser', 'testpass');
          console.log('Login response:', response);
          alert('Login test completed. Check console for details.');
        } catch (error) {
          console.error('Login test failed:', error);
          alert('Login test failed: ' + error.message);
        }
      };

      window.testLogout = async function() {
        try {
          await authMiddleware.logout();
          alert('Logout completed');
        } catch (error) {
          console.error('Logout test failed:', error);
          alert('Logout test failed: ' + error.message);
        }
      };

      window.refreshStatus = function() {
        updateStatus();
      };

      window.goToLogin = function() {
        window.location.href = '/Login.html';
      };

      // Initialize status on page load
      document.addEventListener('DOMContentLoaded', function() {
        updateStatus();
      });
    </script>
  </body>
</html>
